plugins {
    id 'java'
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    implementation group: 'com.github.mac-comp127', name: 'kilt-graphics', version: '1.+'
    implementation("com.openai:openai-java:4.30.0")
    // or
    // implementation group: 'com.openai', name: 'openai-java', version: '4.0.0'
    testImplementation group: 'org.junit.jupiter', name: 'junit-jupiter', version: '5.+'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

java {
    sourceCompatibility = 1.17
    targetCompatibility = 1.17
}

sourceSets.main.java.srcDirs = ['src']
sourceSets.main.resources.srcDirs = ['res']
sourceSets.test.java.srcDirs = ['test']
